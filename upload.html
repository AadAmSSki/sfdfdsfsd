<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edycja</title>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; display: flex; }
        #finalVideo { width: 100%; height: 100%; object-fit: cover; }
        .bottom-bar { position: absolute; bottom: 0; width: 100%; padding: 25px; display: flex; justify-content: flex-end; background: linear-gradient(transparent, rgba(0,0,0,0.6)); box-sizing: border-box; z-index: 20; }
        .btn-next { background: #fe2c55; color: white; border: none; padding: 12px 30px; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .back-arrow { position: absolute; top: 20px; left: 20px; font-size: 30px; cursor: pointer; color: white; text-decoration: none; z-index: 20; }
    </style>
</head>
<body>
    <a href="recorder.html" class="back-arrow">←</a>
    <video id="finalVideo" autoplay playsinline loop muted></video>
    
    <div class="bottom-bar">
        <button class="btn-next" onclick="nextStep()">Dalej</button>
    </div>

    <script>
        const videoElement = document.getElementById('finalVideo');

        // Otwieramy bazę IndexedDB, żeby pobrać wideo
        const request = indexedDB.open("TikTokCloneDB", 1);

        request.onsuccess = (e) => {
            const db = e.target.result;
            const tx = db.transaction("videos", "readonly");
            const getReq = tx.objectStore("videos").get("tempVideo");
            
            getReq.onsuccess = () => {
                const blob = getReq.result;
                if (blob) {
                    // Tworzymy trwały link do pliku w RAM
                    videoElement.src = URL.createObjectURL(blob);
                    videoElement.play().catch(e => console.error("Autoplay zablokowany:", e));
                } else {
                    alert("Błąd: Wideo nie istnieje. Nagraj ponownie.");
                    window.location.href = "recorder.html";
                }
            };
        };

        request.onerror = () => {
            alert("Błąd dostępu do bazy wideo.");
            window.location.href = "recorder.html";
        };

        window.nextStep = () => {
            window.location.href = "upload2.html";
        };
    </script>
</body>
</html>
