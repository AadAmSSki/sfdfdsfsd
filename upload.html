<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edycja - TikTok Clone</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Wideo na cały ekran */
        #finalVideo { width: 100%; height: 100%; object-fit: cover; }
        
        /* Dolny pasek z przyciskiem */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: flex-end; /* Przycisk po prawej */
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            box-sizing: border-box;
        }

        .btn-next {
            background: #fe2c55;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        .back-arrow { position: absolute; top: 20px; left: 20px; font-size: 30px; cursor: pointer; color: white; text-decoration: none; }
    </style>
</head>
<body>

    <a href="recorder.html" class="back-arrow">←</a>
    <video id="finalVideo" autoplay playsinline loop muted></video>
    
    <div class="bottom-bar">
        <button class="btn-next" onclick="publish()">Dalej</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = { /* Twój config */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Załaduj wideo z sesji
        const videoData = sessionStorage.getItem('tempVideo');
        if (videoData) {
            document.getElementById('finalVideo').src = videoData;
        }

        window.publish = async () => {
            // Logika wysyłki do Firebase (Blob z Base64)
            const byteString = atob(videoData.split(',')[1]);
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
            const blob = new Blob([ab], {type: 'video/mp4'});

            const storageRef = ref(storage, 'videos/' + Date.now() + '.mp4');
            await uploadBytes(storageRef, blob);
            const url = await getDownloadURL(storageRef);
            
            await addDoc(collection(db, "videos"), {
                url,
                desc: "", // Tutaj możesz dodać opcjonalny input jeśli chcesz
                author: localStorage.getItem('tiktok_user_name') || "Anonim",
                createdAt: serverTimestamp()
            });
            window.location.href = "index.html";
        };
    </script>
</body>
</html>
