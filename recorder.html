<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nagrywanie</title>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        #videoPreview { position: absolute; top: 0; width: 100%; height: 100%; object-fit: cover; }
        .controls { position: absolute; bottom: 50px; z-index: 10; display: flex; gap: 20px; align-items: center; }
        .btn { padding: 12px 25px; border-radius: 25px; border: none; background: rgba(255,255,255,0.2); color: white; cursor: pointer; font-weight: bold; }
        #recordBtn { 
            width: 70px; height: 70px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.3); background: #fe2c55; 
            transition: transform 0.2s, background-color 0.2s; 
        }
        #recordBtn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <video id="videoPreview" autoplay playsinline muted></video>
    
    <div class="controls">
        <button class="btn" onclick="document.getElementById('galleryInput').click()">Galeria</button>
        <div id="recordBtn"></div>
        <input type="file" id="galleryInput" accept="video/*" style="display:none" onchange="handleFile(this)">
    </div>

    <script type="module">
        let stream, mediaRecorder, recordedChunks = [];
        const btn = document.getElementById('recordBtn');

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                document.getElementById('videoPreview').srcObject = stream;
            } catch (e) { alert("Błąd kamery: " + e.message); }
        }
        startCamera();

        btn.addEventListener('pointerdown', () => {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => saveToDB(new Blob(recordedChunks, { type: "video/mp4" }));
            mediaRecorder.start();
            btn.style.backgroundColor = "#fff";
        });

        btn.addEventListener('pointerup', () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                btn.style.backgroundColor = "#fe2c55";
            }
        });

        window.handleFile = (input) => { if (input.files[0]) saveToDB(input.files[0]); };

        // GOTOWY ZAPIS DO BAZY
        function saveToDB(blob) {
            const request = indexedDB.open("TikTokCloneDB", 1);
            request.onupgradeneeded = (e) => e.target.result.createObjectStore("videos");
            request.onsuccess = (e) => {
                const db = e.target.result;
                const tx = db.transaction("videos", "readwrite");
                tx.objectStore("videos").put(blob, "tempVideo");
                tx.oncomplete = () => { window.location.href = "upload.html"; };
            };
        }
    </script>
</body>
</html>
