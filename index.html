<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Clone</title>

    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('PWA Service Worker zarejestrowany!'));
      }
    </script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; }
        
        #feed { width: 100%; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-card { position: relative; height: 100vh; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .top-nav { position: fixed; top: 10px; width: 100%; display: flex; justify-content: center; gap: 20px; color: white; font-weight: bold; z-index: 10; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; z-index: 100; border-top: 1px solid #333; }
        .nav-item { color: #888; font-size: 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: white; }
        .nav-icon { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }
        .plus-btn { background: white; color: black; padding: 6px 18px; border-radius: 8px; font-weight: bold; font-size: 22px; cursor: pointer; }
        .notif-badge { position: absolute; background: #fe2c55; color: white; font-size: 10px; border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; top: 10px; right: 28%; font-weight: bold; }

        .sidebar { position: absolute; right: 10px; bottom: 80px; display: flex; flex-direction: column; gap: 20px; align-items: center; color: white; z-index: 5; }
        .footer { position: absolute; bottom: 65px; left: 15px; color: white; z-index: 5; }
        .icon { width: 35px; fill: white; cursor: pointer; transition: transform 0.2s; }
        .action:active { transform: scale(0.9); }
        .like-count { font-size: 12px; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="top-nav">
    <span>LIVE</span> <span>Odkryj</span> <span>Obserwowani</span> <span style="border-bottom: 2px solid white;">Dla Ciebie</span>
</div>

<div id="feed"></div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="window.location.href='index.html'">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Główna
    </div>
    <div class="nav-item" onclick="window.location.href='znajomi.html'">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        Znajomi
    </div>
    <div class="plus-btn" onclick="window.location.href='recorder.html'">+</div>
    <div class="nav-item" style="position: relative;">
        <span class="notif-badge">9</span>
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21.99 8c0-.72-.37-1.35-.94-1.7L12 1 2.95 6.3C2.38 6.65 2 7.28 2 8v10c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8zM12 3.72L19.05 8 12 12.28 4.95 8 12 3.72zM20 18H4v-8l8 5 8-5v8z"/></svg>
        Przychodzące
    </div>
    <div class="nav-item" onclick="window.location.href='profile.html'">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        Profil
    </div>
</div>

<script type="module">
    if (!localStorage.getItem('tiktok_user_name')) {
        window.location.href = 'login.html';
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, getDocs, doc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { /* Twój config */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const feed = document.getElementById('feed');
    const currentUser = localStorage.getItem('tiktok_user_name') || "Anonim";

    // Obsługa polubień
    window.toggleLike = async (videoId, btnElement, countElement) => {
        const videoRef = doc(db, "videos", videoId);
        const isLiked = btnElement.style.fill === 'red';
        
        if (isLiked) {
            btnElement.style.fill = 'white';
            countElement.innerText = parseInt(countElement.innerText) - 1;
            await updateDoc(videoRef, { likes: arrayRemove(currentUser) });
        } else {
            btnElement.style.fill = 'red';
            countElement.innerText = parseInt(countElement.innerText) + 1;
            await updateDoc(videoRef, { likes: arrayUnion(currentUser) });
        }
    };

    async function loadVideos() {
        const q = query(collection(db, "videos"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);
        
        snapshot.forEach((doc) => {
            const data = doc.data();
            const likes = data.likes || [];
            const isLiked = likes.includes(currentUser);
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <video src="${data.url}" loop playsinline onclick="this.paused ? this.play() : this.pause()"></video>
                <div class="sidebar">
                    <div class="action" onclick="toggleLike('${doc.id}', this.querySelector('svg'), this.querySelector('.like-count'))">
                        <svg class="icon" viewBox="0 0 24 24" style="fill: ${isLiked ? 'red' : 'white'}">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                        <div class="like-count">${likes.length}</div>
                    </div>
                    <div class="action">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18z"/></svg>
                    </div>
                </div>
                <div class="footer">
                    <h3>@${data.author || 'Anonim'}</h3>
                    <p>${data.desc || ''}</p>
                </div>
            `;
            feed.appendChild(card);
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                const v = e.target.querySelector('video');
                e.isIntersecting ? v.play() : v.pause();
            });
        }, { threshold: 0.7 });

        document.querySelectorAll('.video-card').forEach(c => observer.observe(c));
    }

    loadVideos();
</script>
</body>
</html>
